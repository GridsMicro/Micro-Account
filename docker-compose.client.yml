version: '3.8'
services:
  client:
    image: node:20
    command: sh -c "npm install -g http-server && http-server"
    volumes:
      - ./client:/usr/src/app
    working_dir: /usr/src/app
    ports:
      - "8080:8080"
    environment:
      - API_URL=http://web:5000
    networks:
      - sharednet

networks:
  sharednet:
    driver: bridge
