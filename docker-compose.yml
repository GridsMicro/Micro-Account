services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-account}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-account}
      POSTGRES_DB: ${POSTGRES_DB:-account_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-account} -d ${POSTGRES_DB:-account_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sharednet

  web:
    build: ./server
    command: flask run --host=0.0.0.0
    volumes:
      - ./server:/app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-account}:${POSTGRES_PASSWORD:-account}@db:5432/${POSTGRES_DB:-account_db}
      - FLASK_DEBUG=${FLASK_DEBUG:-1}
      - SECRET_KEY=${SECRET_KEY:-grids-micro-account-secret-key-2026}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - sharednet

  frontend:
    build: ./client
    # Avoid mounting host node_modules. Use a named volume for node_modules when
    # developing, or rely on the image's node_modules for production.
    volumes:
      - ./client:/app:delegated
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_URL=http://web:5000
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sharednet

networks:
  sharednet:
    driver: bridge

volumes:
  db_data:
  frontend_node_modules:
