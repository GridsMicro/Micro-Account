name: Weekly Consistency Audit

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run weekly docs-code consistency audit
        run: node scripts/weekly-consistency-audit.mjs

